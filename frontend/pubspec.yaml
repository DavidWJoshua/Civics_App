name: civic_complaint_system
description: A civic complaint management system that allows citizens to raise, track, and resolve complaints using AI-powered classification.

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  geolocator: ^13.0.0
  geocoding: ^4.0.0
  image_picker: ^1.1.0
  fl_chart: any

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  flutter_windowmanager_plus: ^1.0.1
  path_provider: ^2.1.4
  open_filex: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/